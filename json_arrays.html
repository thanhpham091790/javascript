<!DOCTYPE html>
<html>

<head>
</head>

<body>
   <!-- Accessing array values -->
   <p>Access an array value of a JSON object.</p>

   <p id="demo"></p>
   <!-- Looping through an array using for-in -->
   <p>Looping through an array using a for in loop:</p>

   <p id="demo1"></p>
   <!-- Looping through an array using for -->
   <p>Loopin through an array using a for loop:</p>

   <p id="demo2"></p>
   <!-- Access nested JSON arrays -->
   <p>Looping through arrays inside arrays.</p>

   <p id="demo3"></p>
   <!-- Modify array values -->
   <p>How to modify an array value of a JSON object.</p>

   <p id="demo4"></p>
   <!-- Delete array items -->
   <p>How to delete properties of an array.</p>

   <p id="demo5"></p>

   <script>
      var myObj, i, x = "";
      myObj = {
         "name": "John",
         "age": 30,
         "cars": ["Ford", "BMW", "Fiat"]
      }
      delete myObj.cars[1];
      for(i in myObj.cars){
         x += myObj.cars[i] + "<br>";
      }
      document.getElementById("demo5").innerHTML = x;

      var myObj, i, x = "";
      myObj = {
         "name": "John",
         "age": 30,
         "cars": ["Ford", "BMW", "Fiat"]
      };
      myObj.cars[1] = "Mercedes";
      for (i in myObj.cars) {
         x += myObj.cars[i] + "<br>";
      }
      document.getElementById("demo4").innerHTML = x;

      var myObj, i, j, x = "";
      myObj = {
         "name": "John",
         "age": 30,
         "cars": [
            { "name": "Ford", "models": ["Fiesta", "Focus", "Mustang"] },
            { "name": "BMW", "models": ["320", "X3", "X5"] },
            { "name": "Fiat", "models": ["500", "Panda"] }
         ]
      };
      for (i in myObj.cars) {
         x += "<h2>" + myObj.cars[i].name + "</h2>";
         for (j in myObj.cars[i].models) {
            x += myObj.cars[i].models[j] + "<br>";
         }
      }
      document.getElementById("demo3").innerHTML = x;

      var myObj, i, x = "";
      myObj = {
         "name": "John",
         "age": 30,
         "cars": ["Ford", "BMW", "Fiat"]
      };
      for (i = 0; i < myObj.cars.length; i++) {
         x += myObj.cars[i] + "<br>";
      }
      document.getElementById("demo2").innerHTML = x;

      var myObj, i, x = "";
      myObj = {
         "name": "John",
         "age": 30,
         "cars": ["Ford", "BMW", "Fiat"]
      };
      for (i in myObj.cars) {
         x += myObj.cars[i] + "<br>";
      }
      document.getElementById("demo1").innerHTML = x;

      var myObj, x;
      myObj = {
         "name": "John",
         "age": 30,
         "cars": ["Ford", "BMW", "Fiat"]
      };
      x = myObj.cars[0];
      document.getElementById("demo").innerHTML = x;
   </script>
</body>

</html>
