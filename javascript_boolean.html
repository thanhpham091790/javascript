<!DOCTYPE html>
<html>

<head>
</head>

<body>
   <!-- Display the value of Boolean (10 > 9) -->
   <p>Display the value of Boolean(10 > 9):</p>

   <button onclick="myFunction()">Try it</button>

   <p id="demo"></p>
   <!-- Display the value of 10 > 9 -->
   <p>Display the value of 10 > 9:</p>

   <button onclick="myFunction1()">Try it</button>

   <p id="demo1"></p>
   <!-- Everything with a real value is true -->
   <p id="demo2"></p>
   <!-- The Boolean value of zero, minus zero, empty string, undefined, null, false, NaN is false -->
   <p>Display the Boolean value of 0:</p>

   <button onclick="myFunction3()">Try it</button>

   <p id="demo3"></p>

   <script>
      var a1 = 0;
      var a2 = -0;
      var a3 = "";
      var a4;
      var a5 = null;
      var a6 = false;
      var a7 = NaN;
      function myFunction3() {
         document.getElementById("demo3").innerHTML =
           Boolean(a1) + "<br>" +
           Boolean(a2) + "<br>" +
           Boolean(a3) + "<br>" +
           Boolean(a4) + "<br>" +
           Boolean(a5) + "<br>" +
           Boolean(a6) + "<br>" +
           Boolean(a7);
      }

      var b1 = Boolean(100);
      var b2 = Boolean(3.14);
      var b3 = Boolean(-15);
      var b4 = Boolean("Hello");
      var b5 = Boolean('false');
      var b6 = Boolean(1 + 7 + 3.14);
      document.getElementById("demo").innerHTML =
         "100 is " + b1 + "<br>" +
         "3.14 is " + b2 + "<br>" +
         "-15 is " + b3 + "<br>" +
         "Any (not empty) string is " + b4 + "<br>" +
         "Even the string 'false' is " + b5 + "<br>" +
         "Any expression (except zero) is " + b6;

      function myFunction1() {
         document.getElementById("demo1").innerHTML = 10 > 9;
      }

      function myFunction() {
         document.getElementById("demo").innerHTML = Boolean(10 > 9);
      }
   </script>
</body>

</html>
