<!DOCTYPE html>
<html>

<head>
</head>

<body>
   <!-- The = assignment operator -->
   <h2>The = Operator</h2>

   <p id="demo"></p>
   <!-- The += assignment operator -->
   <h2>The += Operator</h2>

   <p id="demo1"></p>
   <!-- The -= assignment operator -->
   <h2>The -= Operator</h2>

   <p id="demo2"></p>
   <!-- The *= assignment operator -->
   <h2>The *= Operator</h2>

   <p id="demo3"></p>
   <!-- The /= assignment operator -->
   <h2>The /= Operator</h2>

   <p id="demo4"></p>
   <!-- The %= assignment operator -->
   <h2>The %= Operator</h2>

   <p id="demo5"></p>

   <script>
      var x = 10;
      x %= 5;
      document.getElementById("demo5").innerHTML = x;

      var x = 10;
      x /= 5;
      document.getElementById("demo4").innerHTML = x;

      var x = 10;
      x *= 5;
      document.getElementById("demo3").innerHTML = x;

      var x = 10;
      x -= 5;
      document.getElementById("demo2").innerHTML = x;

      var x = 10;
      x += 5;
      document.getElementById("demo1").innerHTML = x;

      var x = 10;
      document.getElementById("demo").innerHTML = x;
   </script>
</body>

</html>
