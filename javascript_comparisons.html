<!DOCTYPE html>
<html>

<head>
</head>

<body>
   <h2>JavaScript Comparison</h2>

   <p>Display the value of the comparison (x == 8):</p>
   
   <p id="demo"></p>
   
   <script>
      var x = 5;
      document.getElementById("demo").innerHTML = (x == 8) + "<br>" + 
      (x == 5) + "<br>" + 
      (x === 5) + "<br>" + 
      (x === "5") + "<br>" + 
      (x != 8) + "<br>" + 
      (x !== 5) + "<br>" + 
      (x !== "5") + "<br>" + 
      (x > 8) + "<br>" + 
      (x < 8) + "<br>" + 
      (x >= 8) + "<br>" + 
      (x <= 8);

   </script>
</body>

</html>
